name: Build Hitbox Module

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build Hitbox Module
        run: |
          mkdir -p build && cd build
          cmake ..             -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake             -DANDROID_ABI=arm64-v8a             -DANDROID_PLATFORM=android-21             -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          ls -la libhitbox_module.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hitbox_module-arm64
          path: build/libhitbox_module.so

      - name: Upload to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libhitbox_module.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
